<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Autonomica · Chat</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1f2430; --border: #2a3140;
    --text: #e6e9ef; --muted: #9aa4b2; --accent: #6d7cff; --accent2: #8b5cf6;
    --ok: #2ecc71; --fail: #ff5d6c; --think: #f0b429;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Inter, system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--panel);
  }
  header .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  header .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--muted); margin-right:6px; }
  header .dot.ok { background: var(--ok); }
  header .dot.bad { background: var(--fail); }

  #chat { flex: 1; overflow-y: auto; padding: 24px 0; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 16px; }
  .msg { margin: 14px 0; display: flex; gap: 12px; }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 8px; flex: 0 0 30px;
    display: grid; place-items: center; font-size: 14px; font-weight: 700;
  }
  .msg.user .avatar { background: #2a3140; }
  .msg.bot .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .bubble { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; max-width: 100%; }
  .msg.user .bubble { background: var(--panel2); }

  .steps { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .step { border-left: 2px solid var(--border); padding: 4px 0 4px 12px; }
  .step .act { font-size: 12px; color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .step .thought { color: var(--text); }
  .step .res { font-size: 12px; color: var(--muted); }

  .thinking { color: var(--think); display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(240,180,41,.3); border-top-color: var(--think);
             border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 8px; }
  .badge.ok { background: rgba(46,204,113,.15); color: var(--ok); }
  .badge.fail { background: rgba(255,93,108,.15); color: var(--fail); }
  .result { margin-top: 8px; }
  .shot { margin-top: 12px; }
  .shot img { max-width: 100%; border-radius: 10px; border: 1px solid var(--border); display:block; }
  .shot .cap { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  footer { border-top: 1px solid var(--border); background: var(--panel); padding: 14px 16px; }
  .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font: inherit; min-height: 48px; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: 0;
    border-radius: 12px; padding: 0 20px; font-weight: 600; cursor: pointer;
  }
  button.send:disabled { opacity: .5; cursor: not-allowed; }
  .hint { max-width: 820px; margin: 8px auto 0; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <h1>Autonomica</h1>
    <div class="status"><span id="dot" class="dot"></span><span id="statusText">проверка…</span></div>
  </header>

  <div id="chat"><div class="wrap" id="messages"></div></div>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Введите команду, напр.: открой famil.ru и перейди в раздел «Магазины»"></textarea>
      <button class="send" id="send">Отправить</button>
    </div>
    <div class="hint">Enter — отправить, Shift+Enter — новая строка. Выполняется одна задача за раз.</div>
  </footer>

<script>
const $ = (s, r=document) => r.querySelector(s);
const messages = $("#messages");
const input = $("#input");
const sendBtn = $("#send");
let busy = false;

function scrollDown() { const c = $("#chat"); c.scrollTop = c.scrollHeight; }

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function addUser(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.innerHTML = `<div class="avatar">Я</div><div class="bubble">${esc(text)}</div>`;
  messages.appendChild(el);
  scrollDown();
}

function addBot() {
  const el = document.createElement("div");
  el.className = "msg bot";
  el.innerHTML = `<div class="avatar">A</div><div class="bubble">
      <div class="thinking"><span class="spinner"></span><span>Думаю…</span></div>
      <div class="steps"></div>
      <div class="tail"></div>
    </div>`;
  messages.appendChild(el);
  scrollDown();
  return el;
}

function renderSteps(bot, steps) {
  const box = $(".steps", bot);
  box.innerHTML = steps.map(s => `
    <div class="step">
      <div class="act">${esc(s.action && s.action.type ? s.action.type : "—")}</div>
      <div class="thought">${esc(s.thought)}</div>
      <div class="res">${esc(s.result)}</div>
    </div>`).join("");
}

async function finalize(bot, task) {
  $(".thinking", bot).remove();
  const tail = $(".tail", bot);
  const ok = task.status === "done";
  const cls = ok ? "ok" : "fail";
  const label = { done: "Успешно", failed: "Не выполнено", cancelled: "Отменено", error: "Ошибка" }[task.status] || task.status;
  let html = `<div class="badge ${cls}">${esc(label)}</div>`;
  if (task.result) html += `<div class="result">${esc(task.result)}</div>`;
  if (task.error) html += `<div class="result">${esc(task.error)}</div>`;
  if (task.has_screenshot) {
    html += `<div class="shot"><div class="cap">Конечное состояние экрана:</div>
             <img src="/chat/screenshot/${task.id}?t=${Date.now()}" alt="screenshot"/></div>`;
  }
  tail.innerHTML = html;
  scrollDown();
}

async function poll(bot, taskId) {
  const terminal = ["done", "failed", "cancelled", "error"];
  while (true) {
    await new Promise(r => setTimeout(r, 1200));
    let task;
    try {
      const res = await fetch(`/chat/task/${taskId}`, { credentials: "same-origin" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      task = await res.json();
    } catch (e) { continue; }
    renderSteps(bot, task.steps || []);
    if (terminal.includes(task.status)) { await finalize(bot, task); return; }
  }
}

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; sendBtn.disabled = true;
  addUser(text);
  input.value = "";
  const bot = addBot();
  try {
    const res = await fetch("/chat/command", {
      method: "POST", credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ command: text }),
    });
    const data = await res.json();
    if (!res.ok) {
      $(".thinking", bot).remove();
      $(".tail", bot).innerHTML = `<div class="badge fail">Ошибка</div><div class="result">${esc(data.detail || res.status)}</div>`;
      return;
    }
    await poll(bot, data.task_id);
  } catch (e) {
    $(".thinking", bot)?.remove();
    $(".tail", bot).innerHTML = `<div class="badge fail">Ошибка сети</div><div class="result">${esc(e.message)}</div>`;
  } finally {
    busy = false; sendBtn.disabled = false; input.focus();
  }
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

async function checkHealth() {
  try {
    const res = await fetch("/health", { credentials: "same-origin" });
    const h = await res.json();
    const ok = h.status === "ok";
    $("#dot").className = "dot " + (ok ? "ok" : "bad");
    $("#statusText").textContent = ok
      ? `${h.model} · vision ${h.vision_enabled ? "on" : "off"}`
      : "сервис не готов";
  } catch (e) {
    $("#dot").className = "dot bad";
    $("#statusText").textContent = "нет связи";
  }
}
checkHealth();
setInterval(checkHealth, 10000);
input.focus();
</script>
</body>
</html>
